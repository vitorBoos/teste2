<p-button label="Novo Usuário" icon="pi pi-plus" (click)="showCreateModal()"></p-button>

<p-table [value]="users">
  <ng-template pTemplate="header">
    <tr>
      <th>Email</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-user>
    <tr>
      <td>{{ user.email }}</td>
    </tr>
  </ng-template>
</p-table>

<p-dialog [(visible)]="displayModal" header="Novo Usuário" [modal]="true" [style]="{width: '300px'}">
  <form [formGroup]="userForm" (ngSubmit)="save()">
    <div class="p-field">
      <label for="email">Email</label>
      <input pInputText id="email" formControlName="email" />
    </div>
    <div class="p-field">
      <label for="senha">Senha</label>
      <input pInputText id="senha" type="password" formControlName="senha" />
    </div>
    <p-button label="Salvar" type="submit"></p-button>
    <p-button label="Cancelar" (click)="displayModal = false"></p-button>
  </form>
</p-dialog>
