<div class="login-container">
  <h2>Login</h2>
  <div class="field">
    <input pInputText type="text" [(ngModel)]="credentials.email" placeholder="Email" />
  </div>
  <div class="field">
    <input pInputText type="password" [(ngModel)]="credentials.password" placeholder="Password" />
  </div>
  <p-button label="Entrar" (onClick)="login()"></p-button>
  <p *ngIf="error" class="error">{{ error }}</p>
</div>
